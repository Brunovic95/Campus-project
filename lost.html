<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Lost Items</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f3f4f6;
}

nav{
    background:#2563eb;
    color:#fff;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

nav h2{
    font-size:22px;
}

nav .links{
    display:flex;
    gap:15px;
    align-items:center;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    text-decoration:underline;
}

#logout-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:5px;
    cursor:pointer;
}

.container{
    max-width:1000px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:8px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card h3{
    margin-bottom:15px;
    color:#2563eb;
}

input,
textarea,
select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

textarea{
    resize:vertical;
    min-height:100px;
}

button[type=submit]{
    margin-top:15px;
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button[type=submit]:hover{
    background:#1d4ed8;
}

.item-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:15px;
    border-bottom:1px solid #ddd;
    padding-bottom:15px;
}

.item-row:last-child{
    border-bottom:none;
}

.delete-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
}

#welcome-user{
    font-weight:bold;
}

#admin-link{
    display:none;
}
</style>

</head>

<body>

<nav>

<h2>Campus Lost & Found</h2>

<div class="links">

<a href="lost.html">My Lost Items</a>

<a href="found.html">Found Items</a>

<a href="admin.html" id="admin-link">Admin</a>

<span id="welcome-user"></span>

<button id="logout-btn">Logout</button>

</div>

</nav>

<div class="container">

<div class="card">

<h3>Report Lost Item</h3>

<form id="lost-form">

<input
id="title"
type="text"
placeholder="Item Name"
required>

<input
id="category"
type="text"
placeholder="Category (Phone, Wallet, Bag...)"
required>

<input
id="location_lost"
type="text"
placeholder="Location Lost"
required>

<textarea
id="description"
placeholder="Description"></textarea>

<button type="submit">
Submit Report
</button>

</form>

</div>

<div class="card">

<h3>My Lost Reports</h3>

<div id="lost-list">

<p>Loading...</p>

</div>

</div>

</div>

<script type="module" src="lost.js"></script>

</body>
</html>
