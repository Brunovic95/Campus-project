<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Lost & Found | Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f3f4f6;
            color: #1f2937;
        }

        nav {
            background: #1d4ed8;
            color: #fff;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        nav h2 {
            font-size: 22px;
        }

        nav .links {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        #logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .container {
            max-width: 1300px;
            margin: 30px auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
        }

        .metric-card h3 {
            color: #6b7280;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .metric-number {
            font-size: 38px;
            font-weight: bold;
            color: #2563eb;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #2563eb;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f8fafc;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: white;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 4px;
            font-weight: bold;
            font-size: 14px;
            color: #4b5563;
        }

        button {
            cursor: pointer;
        }

        .primary-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 5px;
            font-weight: bold;
        }

        .primary-btn:hover {
            background: #1d4ed8;
        }

        .edit-btn {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 7px 12px;
            border-radius: 4px;
            margin-right: 4px;
        }

        .edit-btn:hover {
            background: #d97706;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 7px 12px;
            border-radius: 4px;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        /* Status Badge Styling */
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .state-open { background: #dbeafe; color: #1e40af; }
        .state-claimed { background: #fef3c7; color: #92400e; }
        .state-resolved { background: #dcfce7; color: #166534; }

        .modal {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 95%;
            max-width: 450px;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 12px rgba(0,0,0,.15);
        }

        .modal-content h2 {
            margin-bottom: 10px;
        }

        .modal-content input,
        .modal-content select {
            margin-bottom: 5px;
        }

        @media(max-width:768px){
            nav {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>

    <nav>
        <h2>Campus Lost & Found</h2>
        <div class="links">
            <a href="lost.html">Lost</a>
            <a href="found.html">Found</a>
            <strong id="welcome-user"></strong>
            <button id="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="container">
        <h1 style="margin-bottom:25px;">Administrator Dashboard</h1>

        <div class="dashboard-grid">
            <div class="metric-card">
                <h3>Open Lost Reports</h3>
                <div id="open-lost" class="metric-number">0</div>
            </div>

            <div class="metric-card">
                <h3>Open Found Items</h3>
                <div id="open-found" class="metric-number">0</div>
            </div>

            <div class="metric-card">
                <h3>Registered Users</h3>
                <div id="total-users" class="metric-number">0</div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;">
                <h2>Manage Found Items</h2>
                <button id="open-user-modal" class="primary-btn">+ Add User</button>
            </div>

            <div style="display:flex;gap:15px;margin-top:20px;flex-wrap:wrap;">
                <input id="search-box" type="text" placeholder="Search by title, category or location..." style="flex:2;min-width:250px;">
                
                <select id="status-filter" style="flex:1;min-width:180px;">
                    <option value="all">All Statuses</option>
                    <option value="open">Open</option>
                    <option value="claimed">Claimed</option>
                    <option value="resolved">Resolved</option>
                </select>
            </div>

            <div id="loading-message" style="margin-top:20px; color:#6b7280;">
                Loading found items...
            </div>

            <div style="overflow-x:auto;">
                <table id="items-table" style="display:none;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Location</th>
                            <th>Status</th>
                            <th>Storage</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>

            <div id="empty-message" style="display:none;padding:25px;text-align:center;color:#6b7280;">
                No records found.
            </div>
        </div>
    </div>

    <div class="modal" id="user-modal">
        <div class="modal-content">
            <h2>Create User</h2>
            <form id="create-user-form">
                <label for="user-fullname">Full Name</label>
                <input id="user-fullname" type="text" placeholder="John Doe" required>

                <label for="user-email">Email Address</label>
                <input id="user-email" type="email" placeholder="johndoe@campus.edu" required>

                <label for="user-password">Password</label>
                <input id="user-password" type="password" placeholder="••••••••" required>

                <label for="user-role">Account Role</label>
                <select id="user-role">
                    <option value="student">Student</option>
                    <option value="staff">Staff</option>
                    <option value="admin">Administrator</option>
                </select>

                <button type="submit" class="primary-btn" style="width:100%;margin-top:20px;">Create User</button>
                <button type="button" id="close-user-modal" style="margin-top:10px;width:100%;padding:10px;background:#6b7280;color:white;border:none;border-radius:5px;">Cancel</button>
            </form>
        </div>
    </div>

    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <h2>Edit Found Item</h2>
            <form id="edit-item-form">
                <input type="hidden" id="edit-item-id">

                <label for="edit-item-title">Item Title</label>
                <input id="edit-item-title" type="text" required>

                <label for="edit-item-storage">Storage Location</label>
                <input id="edit-item-storage" type="text" placeholder="Example: Locker A-15">

                <label for="edit-item-status">Item Status</label>
                <select id="edit-item-status">
                    <option value="open">Open</option>
                    <option value="claimed">Claimed</option>
                    <option value="resolved">Resolved</option>
                </select>

                <button type="submit" class="primary-btn" style="width:100%;margin-top:20px;">Save Changes</button>
                <button type="button" id="close-edit-modal" style="margin-top:10px;width:100%;padding:10px;background:#6b7280;color:white;border:none;border-radius:5px;">Cancel</button>
            </form>
        </div>
    </div>

    <footer style="text-align:center;padding:20px;margin-top:40px;color:#6b7280;border-top:1px solid #e5e7eb;">
        Campus Lost &amp; Found System &copy; 2026
    </footer>

    <script type="module" src="admin.js"></script>
</body>
</html>
